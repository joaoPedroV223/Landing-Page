<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - Simples</title>
    <style>
        .botao-confirmar {
    display: inline-block;
    background-color: green;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}
  
        body { font-family: Arial; margin: 20px; line-height: 1.5; }
        .campo { margin-bottom: 15px; }
        label { font-weight: bold; display: block; }
        input[type="text"], input[type="email"], select, textarea { width: 300px; padding: 5px; }
        

        .btn-confirmar { 
            background-color: #1c9b11; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html">Inicio</a> | <a href="../Curriculo/curriculo.html">Currículo</a> | <a href="../github/Github.html">Github</a>
    </nav>

    <h1>Fale Conosco</h1>

    <form action="confirmacao.html">
        
        <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" name="nome" required>
        </div>

        <div class="campo">
            <label>E-mail:</label>
            <input type="email" name="email" required>
        </div>

        <div class="campo">
            <label>Tipo de Cliente:</label>
            <input type="radio" name="tipo" value="PF"> Pessoa Física
            <input type="radio" name="tipo" value="PJ"> Pessoa Jurídica
        </div>

        <div class="campo">
            <label>Melhor horário:</label>
            <select name="horario">
                <option>Manhã</option>
                <option>Tarde</option>
                <option>Noite</option>
            </select>
        </div>

        <div class="campo">
            <label>Serviço desejado:</label>
            <input type="checkbox" name="s1"> Estática 
            <input type="checkbox" name="s2"> Dinâmica 
            <input type="checkbox" name="s3"> Avançada
        </div>

        <div class="campo">
            <label>Descrição:</label>
            <textarea name="desc" rows="3" placeholder="De uma Pequena descrição"></textarea>
        </div>

<a href="../confirmaçãodados/confirmação" class="botao-confirmar">Confirmar Proposta</a>

    </form>

    <br>
    <a href="../index.html">Voltar para Home</a>

</body>
</html>
